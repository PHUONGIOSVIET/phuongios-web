<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — PHUONGIOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <a href="index.html" class="logo" style="font-size:26px">PHUONG<span>IOS</span></a>
    <p>Key Game & Chứng Chỉ Apple</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Đăng nhập</button>
      <button class="auth-tab" onclick="switchAuth('register')">Đăng ký</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label>Tên đăng nhập hoặc Email</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control" id="login-user" placeholder="Nhập username hoặc email">
        </div>
        <div class="form-error" id="err-login">Sai tài khoản hoặc mật khẩu</div>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="login-pw" placeholder="Nhập mật khẩu"
                 onkeydown="if(event.key==='Enter')doLogin()">
          <i class="fas fa-eye toggle-pw" onclick="togglePw('login-pw',this)"></i>
        </div>
      </div>
      <button class="btn btn-primary btn-block" style="padding:13px" onclick="doLogin()" id="btn-login">
        <i class="fas fa-sign-in-alt"></i> Đăng nhập
      </button>
    </div>

    <!-- REGISTER -->
    <div class="auth-form" id="form-register">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control" id="reg-user" placeholder="Chọn username (vd: phuong123)">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-control" id="reg-email" placeholder="example@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="reg-pw" placeholder="Tối thiểu 6 ký tự">
          <i class="fas fa-eye toggle-pw" onclick="togglePw('reg-pw',this)"></i>
        </div>
      </div>
      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="reg-pw2" placeholder="Nhập lại mật khẩu"
                 onkeydown="if(event.key==='Enter')doRegister()">
          <i class="fas fa-eye toggle-pw" onclick="togglePw('reg-pw2',this)"></i>
        </div>
      </div>
      <div class="form-error" id="err-reg" style="margin-bottom:12px">Lỗi đăng ký</div>
      <button class="btn btn-primary btn-block" style="padding:13px" onclick="doRegister()" id="btn-reg">
        <i class="fas fa-user-plus"></i> Tạo tài khoản
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

  function switchAuth(tab) {
    document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-register').classList.toggle('active', tab==='register');
  }

  function togglePw(id, icon) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }

  async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pw').value;
    if (!username || !password) return showErr('err-login', 'Vui lòng nhập đầy đủ thông tin');

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) return showErr('err-login', data.error);

      localStorage.setItem('token', data.token);
      showToast('Đăng nhập thành công!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 500);
    } catch {
      showErr('err-login', 'Lỗi kết nối server');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập';
    }
  }

  async function doRegister() {
    const username = document.getElementById('reg-user').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pw').value;
    const pw2 = document.getElementById('reg-pw2').value;

    if (!username || !email || !password) return showErr('err-reg', 'Vui lòng nhập đầy đủ thông tin');
    if (password.length < 6) return showErr('err-reg', 'Mật khẩu tối thiểu 6 ký tự');
    if (password !== pw2) return showErr('err-reg', 'Mật khẩu không khớp');

    const btn = document.getElementById('btn-reg');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showErr('err-reg', data.error);

      localStorage.setItem('token', data.token);
      showToast('Đăng ký thành công!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 500);
    } catch {
      showErr('err-reg', 'Lỗi kết nối server');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Tạo tài khoản';
    }
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
